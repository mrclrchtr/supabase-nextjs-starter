name: Setup pnpm workspace
description: Install toolchain, restore pnpm cache, and install dependencies
runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: |
        echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
        echo "version=$(pnpm --version)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ steps.pnpm-store.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ steps.pnpm-store.outputs.version }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
