name: Setup pnpm workspace
description: Install toolchain, restore pnpm cache, and install dependencies
runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4.2.3

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: |
        echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
        echo "version=$(pnpm --version)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ steps.pnpm-store.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ steps.pnpm-store.outputs.version }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
