name: Setup pnpm workspace
description: Install toolchain, restore pnpm cache, and install dependencies
runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: |
        echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
        echo "version=$(pnpm --version)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ steps.pnpm-store.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ steps.pnpm-store.outputs.version }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
